[pytest]
# Добавляем корень проекта в PYTHONPATH
pythonpath = .

# Паттерны для поиска тестов
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Отключаем предупреждения, которые засоряют вывод
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
